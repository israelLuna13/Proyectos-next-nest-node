version: '3.9'

services:
  app:
    image: node:22-alpine
    container_name: node_api_ecommerce
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
     - ./back_node_ts:/app
     - /app/node_modules
    command: sh -c "npm install && npm run dev:api"
    depends_on:
      - db
  db:
    image: postgres:17
    container_name: postgre_db
    restart: always
    environment:
      - POSTGRES_PASSWORD=123456
      - POSTGRES_USER=root
      - POSTGRES_DB=ecommerce_data
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data:
  
